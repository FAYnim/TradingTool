<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingTool</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>TradingTool</h1>
        </header>

        <main>
            <button class="button">Refresh</button>

            <div class="data-container">
                <div class="data-item">
                    <div class="data-box">H24</div>
                    <input type="text" class="data-input" id="h24" placeholder="Value" readonly>
                </div>
                <div class="data-item">
                    <div class="data-box">CP</div>
                    <input type="text" class="data-input" id="cp" placeholder="Value" readonly>
                </div>
                <div class="data-item">
                    <div class="data-box">L24</div>
                    <input type="text" class="data-input" id="l24" placeholder="Value" readonly>
                </div>
            </div>
        </main>

        <footer>
            <p>Made with love by FAY</p>
        </footer>
    </div>
<script src="js/script.js">
</script>
</body>
</html>
