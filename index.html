<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingTool</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #121212;
            color: #f0f0f0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
        }

        header {
            text-align: left;
            padding: 20px;
            background-color: #212121;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 0.5em;
            color: #eee;
        }

        main {
            min-height: 60vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .button {
            background-color: #eee;
            color: #212121;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            margin-bottom: 20px;
        }

        .data-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 20px;
        }

        .data-item {
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .data-box {
            text-align: center;
            min-width: 80px;
        }

        .data-input {
            background-color: #333;
            color: #f0f0f0;
            border: none;
            padding: 5px 10px;
            border-radius: 15px;
            text-align: center;
            width: 80px;
        }

        footer {
            background-color: #212121;
            text-align: center;
            padding: 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        footer p {
            font-size: 0.9em;
            color: #ccc;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>TradingTool</h1>
        </header>

        <main>
            <button class="button">Refresh</button>

            <div class="data-container">
                <div class="data-item">
                    <div class="data-box">H24</div>
                    <input type="text" class="data-input" id="h24" placeholder="Value">
                </div>
                <div class="data-item">
                    <div class="data-box">CP</div>
                    <input type="text" class="data-input" id="cp" placeholder="Value">
                </div>
                <div class="data-item">
                    <div class="data-box">L24</div>
                    <input type="text" class="data-input" id="l24" placeholder="Value">
                </div>
            </div>
        </main>

        <footer>
            <p>Made with love by FAY</p>
        </footer>
    </div>

</body>
</html>
